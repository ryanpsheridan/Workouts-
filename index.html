<style>
  @font-face {
    font-family: "DM Sans";
    src: url("DMSans-VariableFont_opsz,wght.ttf") format("truetype");
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "DM Sans";
    src: url("DMSans-Italic-VariableFont_opsz,wght.ttf") format("truetype");
    font-weight: 100 900;
    font-style: italic;
    font-display: swap;
  }

  :root {
    --bg: #e7eaf0;
    --surface: #ffffff;
    --ink: #12161d;
    --ink-2: #4c5465;
    --ink-3: #949cad;
    --line: #e7e9ef;
    --line-2: #eff1f5;
    --field: #f1f3f6;
    --field-active: #e8ebf0;
    --ck-border: #cbd1dc;
    --link: #2563eb;          /* blue = tappable link */
    --link-soft: #eef4ff;
    --link-border: #d7e3fb;
    --link-soft-active: #e2ecfe;
    --done: #16a34a;          /* green = completed / progress */
    --accent: #2563eb;        /* per-day section color, set on each panel */
    --accent-soft: #eef4ff;
    --nav-bg: rgba(231,234,240,0.86);
    --shadow: 0 1px 2px rgba(16,21,31,0.05), 0 4px 14px rgba(16,21,31,0.05);
    --font: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
    color-scheme: light;
  }

  /* Dark theme: applied when the user picks it, or by system when not overridden */
  :root[data-theme="dark"] { color-scheme: dark; }
  @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) { color-scheme: dark; } }

  :root[data-theme="dark"],
  :root:not([data-theme="light"]) {}

  :root[data-theme="dark"] {
    --bg: #0a0c11;
    --surface: #13171e;
    --ink: #eef1f7;
    --ink-2: #abb5c5;
    --ink-3: #737d8e;
    --line: #2d3441;
    --line-2: #232a34;
    --field: #262d3a;
    --field-active: #303947;
    --ck-border: #454e5d;
    --link: #6ea8ff;
    --link-soft: #172741;
    --link-border: #2f4a72;
    --link-soft-active: #203353;
    --done: #33c971;
    --accent-soft: #172741;
    --nav-bg: rgba(10,12,17,0.85);
    --shadow: 0 1px 2px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.4);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #0a0c11;
      --surface: #13171e;
      --ink: #eef1f7;
      --ink-2: #abb5c5;
      --ink-3: #737d8e;
      --line: #2d3441;
      --line-2: #232a34;
      --field: #262d3a;
      --field-active: #303947;
      --ck-border: #454e5d;
      --link: #6ea8ff;
      --link-soft: #172741;
      --link-border: #2f4a72;
      --link-soft-active: #203353;
      --done: #33c971;
      --accent-soft: #172741;
      --nav-bg: rgba(10,12,17,0.85);
      --shadow: 0 1px 2px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.4);
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
  }

  body {
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    max-width: 640px;
    margin: 0 auto;
    padding-bottom: 3rem;
    -webkit-text-size-adjust: 100%;
  }

  a { color: var(--link); }

  /* ---------- Header ---------- */
  /* Positioned + z-index'd above .app-menu so the header (fully transparent except its
     own text/icon glyphs) stays on top when the menu opens, with no seam against it. */
  .app-header { position: relative; z-index: 41; padding: calc(1.6rem + env(safe-area-inset-top)) 1.25rem 0.9rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .app-header h1 { font-size: 22px; font-weight: 400; letter-spacing: -0.02em; line-height: 1.1; text-transform: lowercase; }
  .menu-toggle {
    flex: none; width: 38px; height: 38px; border: none; background: none; color: var(--ink);
    display: grid; place-items: center; cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s ease;
  }
  .menu-toggle:active { transform: scale(0.9); }

  /* Two bars that rotate in place into an X - same button element in both states, not a swap */
  .menu-toggle-bars { position: relative; width: 21.6px; height: 12px; }
  .menu-toggle-bars span {
    position: absolute; left: 0; width: 21.6px; height: 1.9px; border-radius: 0.95px;
    background: currentColor; transition: transform 0.25s ease, top 0.25s ease;
  }
  .menu-toggle-bars span:first-child { top: 0; }
  .menu-toggle-bars span:last-child { top: 9.6px; }
  .menu-toggle.open .menu-toggle-bars span:first-child { top: 5.05px; transform: rotate(45deg); }
  .menu-toggle.open .menu-toggle-bars span:last-child { top: 5.05px; transform: rotate(-45deg); }

  /* ---------- Hamburger menu (full-screen takeover) ---------- */
  .app-menu {
    position: fixed; inset: 0; z-index: 40; background: var(--surface);
    display: flex; flex-direction: column;
    opacity: 0; visibility: hidden; transform: translateY(6px);
    transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s linear 0.2s;
  }
  .app-menu.open { opacity: 1; visibility: visible; transform: translateY(0); transition: opacity 0.2s ease, transform 0.2s ease; }
  .menu-items { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.9rem; padding: 2rem 1.25rem; }
  .menu-item {
    display: inline-flex; align-items: center; gap: 7px;
    border: none; background: none; font-family: inherit;
    font-size: 27px; font-weight: 400; letter-spacing: -0.02em;
    color: var(--ink); text-decoration: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: opacity 0.1s ease;
  }
  .menu-item:active { opacity: 0.55; }
  .menu-item svg { width: 20px; height: 20px; }

  /* ---------- Sticky day nav ---------- */
  .day-nav {
    position: sticky; top: 0; z-index: 20;
    display: flex; gap: 7px;
    padding: calc(11px + env(safe-area-inset-top)) 1.25rem 11px;
    overflow-x: auto; scrollbar-width: none;
    background: var(--nav-bg);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-pill {
    flex: 1 0 auto; min-width: 74px;
    padding: 11px 13px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--surface);
    font-family: inherit; cursor: pointer; text-align: center; line-height: 1.15;
    font-size: 13.5px; font-weight: 400; color: var(--ink); letter-spacing: -0.01em;
    transition: transform 0.12s ease, background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .day-pill:active { transform: scale(0.96); }
  .day-pill.active { border-color: transparent; color: #fff; }

  /* ---------- Day panel ---------- */
  .day-panel { display: none; padding: 0 1.25rem; }
  .day-panel.visible { display: block; animation: panelIn 0.18s ease; }
  @keyframes panelIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

  .day-hero { padding: 1.55rem 0 0.3rem; }
  .day-rule { display: block; width: 26px; height: 3px; border-radius: 2px; background: var(--accent); margin-bottom: 13px; }
  .day-hero h2 { font-size: 27px; font-weight: 800; letter-spacing: -0.03em; }
  .day-hero .focus { font-size: 16.5px; color: var(--ink-2); margin-top: 5px; font-weight: 400; line-height: 1.35; }

  .progress { display: flex; align-items: center; gap: 10px; margin-top: 14px; font-size: 12.5px; color: var(--ink-3); font-weight: 400; }
  .progress .bar { flex: 1; height: 4px; border-radius: 3px; background: var(--line); overflow: hidden; max-width: 150px; }
  .progress .bar > i { display: block; height: 100%; width: 0; background: var(--done); transition: width 0.25s ease; }
  .progress .reset { border: none; background: none; font-family: inherit; font-size: 12.5px; color: var(--link); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; padding: 0; transition: opacity 0.1s ease; }
  .progress .reset:active { opacity: 0.55; }

  /* ---------- Get started ---------- */
  /* Collapses via grid-template-rows (like the accordion) instead of an
     instant display:none, so it shrinks away in step with the section
     opening below it rather than causing two separate layout jumps. */
  .starter-wrap {
    display: grid; grid-template-rows: 1fr; opacity: 1; margin-top: 1.4rem;
    transition: grid-template-rows 0.28s ease, opacity 0.2s ease, margin-top 0.28s ease;
  }
  .starter-wrap > .starter { overflow: hidden; min-height: 0; }
  .starter-wrap.hidden { grid-template-rows: 0fr; opacity: 0; margin-top: 0; pointer-events: none; }
  .starter-wrap.hidden .starter { padding-top: 0; padding-bottom: 0; }
  .starter {
    width: 100%; padding: 15px; border: none; border-radius: 12px;
    background: var(--accent); color: #fff; font-family: inherit; font-size: 15px; font-weight: 400;
    letter-spacing: -0.01em; cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s ease, opacity 0.12s ease, padding 0.28s ease;
  }
  .starter:active { transform: scale(0.98); opacity: 0.9; }

  /* ---------- Section (warm-up + phases share this) ---------- */
  .sec { margin-top: 1.4rem; }
  .sec-head {
    width: 100%; display: flex; align-items: center; gap: 11px;
    padding: 10px 2px 11px; background: none; border: none; cursor: pointer;
    font-family: inherit; text-align: left; -webkit-tap-highlight-color: transparent;
  }
  .sec-num { flex: none; font-family: var(--mono); font-size: 15px; font-weight: 400; color: var(--accent); min-width: 22px; }
  .sec-title { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .sec-name { font-size: 15px; font-weight: 400; color: var(--ink); }
  .sec-sub { font-size: 11.5px; font-weight: 400; color: var(--ink-3); margin-top: 1px; }
  .sec-status { font-size: 11.5px; font-weight: 400; color: var(--ink-3); display: flex; align-items: center; }
  .sec-check { width: 18px; height: 18px; border-radius: 50%; background: var(--done); position: relative; display: inline-block; animation: ckPop 0.22s ease; }
  @keyframes ckPop { 0% { transform: scale(0.7); opacity: 0.5; } 65% { transform: scale(1.12); } 100% { transform: scale(1); opacity: 1; } }
  .sec-check::after { content: ""; position: absolute; left: 7px; top: 3.95px; width: 4px; height: 8px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .chev { width: 9px; height: 9px; border-right: 2px solid var(--ink-3); border-bottom: 2px solid var(--ink-3); transform: rotate(-135deg); transition: transform 0.22s ease; margin: 0 2px; }
  .sec.collapsed .chev { transform: rotate(45deg); }
  .sec-head { transition: opacity 0.1s ease; }
  .sec-head:active { opacity: 0.55; }
  .sec-body {
    display: grid;
    grid-template-rows: 1fr;
    opacity: 1;
    transition: grid-template-rows 0.26s ease, opacity 0.2s ease;
  }
  .sec-body > .card { overflow: hidden; min-height: 0; }
  .sec.collapsed .sec-body { grid-template-rows: 0fr; opacity: 0; }
  .sec.collapsed .sec-head { padding-bottom: 10px; }

  /* ---------- One card per section; one checkbox per group ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .grp { display: grid; grid-template-columns: 1fr 22px; gap: 12px; padding: 1.25rem; align-items: start; }
  .grp + .grp { border-top: 1px solid var(--line); }
  .grp-main { min-width: 0; }
  .grp-tag { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 9px; }
  .grp.done .grp-main { opacity: 0.42; transition: opacity 0.15s ease; }

  .ck {
    width: 22px; height: 22px; margin-top: 1px; flex: none; padding: 0;
    border-radius: 50%; border: 1.5px solid var(--ck-border); background: var(--surface);
    cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }
  .ck:active { transform: scale(0.88); }
  .ck.done { background: var(--done); border-color: var(--done); animation: ckPop 0.22s ease; }
  .ck.done::after { content: ""; position: absolute; left: 7px; top: 4.4px; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }

  .ex + .ex { margin-top: 18px; }
  .ex-name { font-size: 18px; font-weight: 650; letter-spacing: -0.015em; color: var(--ink); word-break: break-word; }
  .ex-note { font-size: 13.5px; color: var(--ink-2); margin-top: 5px; line-height: 1.5; cursor: pointer; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
  .ex-note.open { display: block; -webkit-line-clamp: none; overflow: visible; }

  /* reps + demo sit in one left-aligned badge row below the description */
  .ex-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 10px; }
  .ex-reps { display: inline-flex; align-items: center; padding: 5px 11px; border: 1px solid var(--line); border-radius: 8px; background: var(--field); font-size: 11px; font-weight: 400; letter-spacing: 0.02em; color: var(--ink-2); white-space: nowrap; }

  /* chiropractor posture-cue badge - sits right after the reps badge, tinted to the day's accent color.
     Mixed against --surface (not --accent-soft, which is a fixed light pastel per day) so it fades
     correctly in dark mode too, matching the muted feel of .ex-demo. */
  .ex-posture { display: inline-flex; align-items: center; padding: 5px 11px; border-radius: 8px; background: color-mix(in srgb, var(--accent) 14%, var(--surface)); border: 1px solid color-mix(in srgb, var(--accent) 32%, var(--surface)); font-size: 11px; font-weight: 400; letter-spacing: 0.02em; color: var(--accent); white-space: nowrap; }

  /* how-to link lives in a consistent chip at the card foot, off the title */
  .ex-demo {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 11px 5px 10px; border: 1px solid var(--link-border); border-radius: 8px;
    background: var(--link-soft); font-size: 11px; font-weight: 400; letter-spacing: 0.02em;
    color: var(--link); text-decoration: none; -webkit-tap-highlight-color: transparent;
    transition: background 0.12s ease, transform 0.1s ease;
  }
  .ex-demo::before { content: ""; width: 0; height: 0; border-style: solid; border-width: 5px 0 5px 8px; border-color: transparent transparent transparent var(--link); }
  .ex-demo:active { background: var(--link-soft-active); transform: scale(0.97); }

  /* section-level "mark all" bar at card foot */
  .sec-all {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 9px;
    padding: 13px; background: var(--field); border: none; border-top: 1px solid var(--line);
    font-family: inherit; font-size: 12.5px; font-weight: 400; letter-spacing: 0.02em;
    color: var(--ink-2); cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: background 0.12s ease, color 0.15s ease;
  }
  .sec-all:active { background: var(--field-active); }
  .sec-all-ck { width: 16px; height: 16px; flex: none; border-radius: 50%; border: 1.5px solid var(--ink-3); position: relative; transition: background 0.15s ease, border-color 0.15s ease; }
  .sec-all.done { color: var(--done); }
  .sec-all.done .sec-all-ck { background: var(--done); border-color: var(--done); }
  .sec-all.done .sec-all-ck::after { content: ""; position: absolute; left: 5px; top: 2.5px; width: 3.5px; height: 7px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
</style>
</head>

<script>
// Warm-ups are unique per day and prep the muscles left sore by the PREVIOUS
// session. Weekly flow: Lower A -> Upper A -> Lower B -> Upper B -> repeat.
// Every warm-up finishes with a bar hang. ex = plain name; link = how-to URL.
const WARMUPS = {
  "lower-a": [ // prior: Upper B (pull day) -> lats, upper back, biceps, forearms
    { ss: "1", ord: "1A", ex: "Cat-Cow with Rotation", link: "https://www.youtube.com/watch?v=YPTKZy_kKt8", rp: "8 / side", note: "Unwind the lats and upper back from yesterday's pulling. Exhale as you rotate open." },
    { ss: "",  ord: "1B", ex: "Open Books", link: "https://www.youtube.com/watch?v=rDviWORCWEw", rp: "8 / side", note: "More t-spine rotation to free up after all the pull-ups and rows." },
    { ss: "2", ord: "2A", ex: "90/90 Hip Switches", link: "https://www.youtube.com/watch?v=qq_Z7sAmVrA", rp: "8 / side", note: "Internal + external hip rotation - the range golf demands. Chest tall, hips do the work." },
    { ss: "",  ord: "2B", ex: "World's Greatest Stretch", rp: "5 / side", note: "Full hip opener with a thoracic reach at the top." },
    { ss: "",  ord: "2C", ex: "Bretzel", link: "https://www.youtube.com/watch?v=1U2RPN5vAWQ", rp: "5 breaths / side", note: "Your golf-trainer move - t-spine and hip in one. Perfect prep for the twisting lunges and chops ahead." },
    { ss: "3", ord: "3A", ex: "Glute Bridge (2 sec hold)", link: "https://www.youtube.com/watch?v=wPM8icPu6H8", rp: "12 reps", note: "Fire the glutes before they carry the whole session." },
    { ss: "",  ord: "3B", ex: "Walking Lunges", rp: "10 / side", note: "Light and smooth - potentiate the legs for the day." },
    { ss: "",  ord: "3C", ex: "Lateral Band Walks", rp: "15 steps / side", note: "Switch on the glute med for all the single-leg work ahead." },
    { ss: "4", ord: "4A", ex: "Dead Hang", rp: "30-60 sec", note: "Hang from the bar - decompress the spine and give the grip and lats one more stretch after yesterday's pulling." }
  ],
  "upper-a": [ // today: PRESS/carries/arms. prior: Lower A -> glutes, quads, hip flexors
    { ss: "1", ord: "1A", ex: "Shoulder CARs", rp: "5 / side", note: "Take each shoulder slowly through its full circle - the best prep before pressing." },
    { ss: "",  ord: "1B", ex: "Band Pull-Aparts", rp: "15 reps", note: "Rear delts + mid-back on to balance all the pressing to come. Chiropractor cue: shoulder blades back.", posture: "Shoulder blades back" },
    { ss: "2", ord: "2A", ex: "Thoracic Rotations", rp: "10 / side", note: "Free up the mid-back so the press stays off the low back." },
    { ss: "",  ord: "2B", ex: "90/90 Hip Switches", link: "https://www.youtube.com/watch?v=qq_Z7sAmVrA", rp: "8 / side", note: "Loosen the hips Lower A hammered yesterday, and keep the golf rotation ticking over." },
    { ss: "3", ord: "3A", ex: "Wall Hip Flexor Stretch", rp: "30 sec / side", note: "Open the hip flexors cooked by yesterday's lunges." },
    { ss: "",  ord: "3B", ex: "Bird-Dogs", link: "https://www.youtube.com/watch?v=g_BYB0R-4Ws", rp: "10 / side", note: "Gentle core switch-on, back stays flat." },
    { ss: "4", ord: "4A", ex: "Dead Hang", rp: "30-60 sec", note: "Hang from the bar - decompress the spine and wake up the grip for the carries." }
  ],

let activeId = DAYS[0].id;
let STATE = {};
try { STATE = JSON.parse(localStorage.getItem("wp-v1")) || {}; } catch (e) { STATE = {}; }
function save() { try { localStorage.setItem("wp-v1", JSON.stringify(STATE)); } catch (e) {} }
function dayFromKey(key) { return key.split("#")[0]; }
function panelDay(el) { return el.closest(".day-panel").id.slice(2); }

function groupRows(rows) {
  const groups = [];
  rows.forEach(r => {
    if (r.ss !== "" || groups.length === 0) groups.push([r]);
    else groups[groups.length - 1].push(r);
  });
  return groups;
}

function exRowHtml(r) {
  const note = r.note ? `<div class="ex-note">${r.note}</div>` : "";
  const reps = r.rp ? `<span class="ex-reps">${r.rp}</span>` : "";
  const posture = r.posture ? `<span class="ex-posture" title="Chiropractor cue: ${r.posture}">Posture</span>` : "";
  const demo = r.link ? `<a class="ex-demo" href="${r.link}" target="_blank" rel="noopener">Demo</a>` : "";
  const meta = (reps || posture || demo) ? `<div class="ex-meta">${reps}${posture}${demo}</div>` : "";
  return `<div class="ex">
    <div class="ex-name">${r.ex}</div>${note}${meta}
  </div>`;
}

// One checkbox per group (a whole superset checks off in a single tap).
function groupHtml(group, key) {
  const on = STATE[key] ? " done" : "";
  const isSS = group.length > 1;
  const tag = isSS ? `<div class="grp-tag">${group.length >= 4 ? "Giant set" : group.length === 3 ? "Tri-set" : "Superset"}</div>` : "";
  const rows = group.map(exRowHtml).join("");
  return `<div class="grp${on}">
    <div class="grp-main">${tag}${rows}</div>
    <button class="ck${on}" data-key="${key}" aria-label="Mark complete" aria-pressed="${!!STATE[key]}"></button>
  </div>`;
}

function cardHtml(rows, prefix, secId) {
  const groups = groupRows(rows).map((g, gi) => groupHtml(g, `${prefix}#g${gi}`)).join("");
  return `<div class="card">${groups}<button class="sec-all" data-sec="${secId}"><span class="sec-all-ck"></span><span class="sec-all-t">Mark all complete</span></button></div>`;
}

function sectionHtml(secId, num, title, sub, rows, prefix) {
  const subHtml = sub ? `<span class="sec-sub">${sub}</span>` : "";
  return `<section class="sec" id="sec-${secId}">
    <button class="sec-head" aria-expanded="true" aria-controls="body-${secId}">
      <span class="sec-num">${num}</span>
      <span class="sec-title"><span class="sec-name">${title}</span>${subHtml}</span>
      <span class="sec-status" data-status="${secId}"></span>
      <span class="chev"></span>
    </button>
    <div class="sec-body" id="body-${secId}">${cardHtml(rows, prefix, secId)}</div>
  </section>`;
}

function buildUI() {
  document.getElementById("day-nav").innerHTML = DAYS.map(d =>
    `<button class="day-pill" role="tab" aria-selected="false" data-day="${d.id}">${d.label}</button>`
  ).join("");

  document.getElementById("content").innerHTML = DAYS.map(d => {
    const warmup = WARMUPS[d.id] || [];
    const warmSec = sectionHtml(`${d.id}-wu`, "00", "Pre-flight warm-up", "", warmup, `${d.id}#wu`);
    const phaseSecs = d.phases.map((p, i) =>
      sectionHtml(`${d.id}-p${i}`, "0" + (i + 1), p.name, "", p.rows, `${d.id}#${i}`)
    ).join("");

    return `<div class="day-panel" role="tabpanel" id="s-${d.id}" style="--accent:${d.color};--accent-soft:${d.soft}">
      <div class="day-hero">
        <span class="day-rule"></span>
        <h2>${d.label}</h2>
        <div class="focus">${d.focus}</div>
        <div class="progress">
          <span id="pg-${d.id}">0 / 0 done</span>
          <span class="bar"><i id="bar-${d.id}"></i></span>
          <button class="reset" data-day="${d.id}" style="display:none">Reset</button>
        </div>
      </div>
      <div class="starter-wrap" id="starter-wrap-${d.id}">
        <button class="starter" data-day="${d.id}">Get started</button>
      </div>
      ${warmSec}
      ${phaseSecs}
    </div>`;
  }).join("");

  // Everything starts collapsed; the "Get started" button opens the first one.
  DAYS.forEach(d => {
    const panel = document.getElementById("s-" + d.id);
    initDay(panel);
    updateProgress(d.id);
    updateStarter(d.id);
  });
}

function sectionEl(secId) { return document.getElementById("sec-" + secId); }

function isComplete(sec) {
  const total = sec.querySelectorAll(".ck").length;
  const done = sec.querySelectorAll(".ck.done").length;
  return total > 0 && done === total;
}

function refreshSection(secId) {
  const sec = sectionEl(secId);
  if (!sec) return false;
  const total = sec.querySelectorAll(".ck").length;
  const done = sec.querySelectorAll(".ck.done").length;
  const st = sec.querySelector("[data-status]");
  const complete = total > 0 && done === total;
  if (st) {
    if (complete) st.innerHTML = '<span class="sec-check"></span>';
    else if (done > 0) st.textContent = `${done} / ${total}`;
    else st.textContent = "";
  }
  updateSecAll(secId);
  return complete;
}

function updateSecAll(secId) {
  const sec = sectionEl(secId);
  if (!sec) return;
  const btn = sec.querySelector(".sec-all");
  if (!btn) return;
  const cks = [...sec.querySelectorAll(".ck")];
  const allDone = cks.length > 0 && cks.every(c => c.classList.contains("done"));
  btn.classList.toggle("done", allDone);
  const t = btn.querySelector(".sec-all-t");
  if (t) t.textContent = allDone ? "Unmark all" : "Mark all complete";
}

function collapse(sec, on) {
  sec.classList.toggle("collapsed", on);
  const head = sec.querySelector(".sec-head");
  if (head) head.setAttribute("aria-expanded", String(!on));
}

// Only one section open at a time.
function focusSection(sec) {
  const panel = sec.closest(".day-panel");
  panel.querySelectorAll(".sec").forEach(s => collapse(s, s !== sec));
}

function nextSection(sec) {
  const secs = [...sec.closest(".day-panel").querySelectorAll(".sec")];
  return secs[secs.indexOf(sec) + 1] || null;
}

// All sections start collapsed (the "Get started" button opens the first).
function initDay(panel) {
  panel.querySelectorAll(".sec").forEach(s => {
    refreshSection(s.id.replace("sec-", ""));
    collapse(s, true);
  });
}

// The "Get started" / "Resume" button shows only when nothing is open yet and
// the day isn't already finished.
function updateStarter(dayId) {
  const panel = document.getElementById("s-" + dayId);
  if (!panel) return;
  const wrap = panel.querySelector(".starter-wrap");
  const starter = panel.querySelector(".starter");
  if (!wrap || !starter) return;
  const secs = [...panel.querySelectorAll(".sec")];
  const anyOpen = secs.some(s => !s.classList.contains("collapsed"));
  const phases = secs.filter(s => !s.id.endsWith("-wu"));
  const allDone = phases.length > 0 && phases.every(s => isComplete(s));
  wrap.classList.toggle("hidden", anyOpen || allDone);
  starter.textContent = panel.querySelectorAll(".ck.done").length > 0 ? "Resume" : "Get started";
}

function updateProgress(dayId) {
  const panel = document.getElementById("s-" + dayId);
  if (!panel) return;
  // Day progress counts working groups only (warm-up is pick-and-choose).
  const cks = [...panel.querySelectorAll(".ck")].filter(c => c.dataset.key.indexOf("#wu#") < 0);
  const done = cks.filter(c => c.classList.contains("done")).length;
  const pg = document.getElementById("pg-" + dayId);
  const bar = document.getElementById("bar-" + dayId);
  const reset = panel.querySelector(".reset");
  if (pg) pg.textContent = `${done} / ${cks.length} done`;
  if (bar) bar.style.width = cks.length ? `${(done / cks.length) * 100}%` : "0";
  if (reset) reset.style.display = panel.querySelectorAll(".ck.done").length > 0 ? "" : "none";
}

function setCk(ck, on) {
  ck.classList.toggle("done", on);
  ck.setAttribute("aria-pressed", String(on));
  const grp = ck.closest(".grp");
  if (grp) grp.classList.toggle("done", on);
  if (on) STATE[ck.dataset.key] = 1; else delete STATE[ck.dataset.key];
}

function autoAdvance(sec) {
  setTimeout(() => {
    if (!isComplete(sec)) return;
    collapse(sec, true);
    const nxt = nextSection(sec);
    if (nxt) {
      collapse(nxt, false);
      const y = nxt.getBoundingClientRect().top + window.scrollY - 82;
      window.scrollTo({ top: y, behavior: "smooth" });
    }
    updateStarter(panelDay(sec));
  }, 380);
}

// Checking a group glides down to the next unchecked one in the section,
// with the same timing/easing as the section-complete auto-advance.
function scrollToNextGroup(ck, sec) {
  const grps = [...sec.querySelectorAll(".grp")];
  const nxt = grps.slice(grps.indexOf(ck.closest(".grp")) + 1)
    .find(g => !g.classList.contains("done"));
  if (!nxt) return;
  setTimeout(() => {
    const y = nxt.getBoundingClientRect().top + window.scrollY - 82;
    window.scrollTo({ top: y, behavior: "smooth" });
  }, 380);
}

function toggleCk(ck) {
  const on = !ck.classList.contains("done");
  setCk(ck, on);
  save();
  const sec = ck.closest(".sec");
  const secId = sec.id.replace("sec-", "");
  const complete = refreshSection(secId);
  updateProgress(dayFromKey(ck.dataset.key));
  updateStarter(dayFromKey(ck.dataset.key));
  if (complete) autoAdvance(sec);
  else if (on) scrollToNextGroup(ck, sec);
}

function toggleSectionAll(secId) {
  const sec = sectionEl(secId);
  if (!sec) return;
  const cks = [...sec.querySelectorAll(".ck")];
  if (!cks.length) return;
  const allDone = cks.every(c => c.classList.contains("done"));
  cks.forEach(c => setCk(c, !allDone));
  save();
  const complete = refreshSection(secId);
  const dayId = dayFromKey(cks[0].dataset.key);
  updateProgress(dayId);
  updateStarter(dayId);
  if (complete) autoAdvance(sec);
}

function resetDay(dayId) {
  const panel = document.getElementById("s-" + dayId);
  if (!panel) return;
  panel.querySelectorAll(".ck.done").forEach(ck => setCk(ck, false));
  save();
  panel.querySelectorAll(".sec").forEach(s => {
    refreshSection(s.id.replace("sec-", ""));
    collapse(s, true);
  });
  updateProgress(dayId);
  updateStarter(dayId);
}

function setDay(id) {
  activeId = id;
  const day = DAYS.find(d => d.id === id);
  document.querySelectorAll(".day-pill").forEach(pill => {
    const on = pill.dataset.day === id;
    pill.classList.toggle("active", on);
    pill.setAttribute("aria-selected", on);
    pill.style.background = on ? day.color : "";
  });
  document.querySelectorAll(".day-panel").forEach(panel => {
    panel.classList.toggle("visible", panel.id === `s-${id}`);
  });
  window.scrollTo({ top: 0 });
}

document.addEventListener("click", e => {
  const menuToggle = e.target.closest("#menu-toggle");
  if (menuToggle) { toggleMenu(); return; }
  const themeItem = e.target.closest("#menu-theme");
  if (themeItem) { toggleTheme(); closeMenu(); return; }
  const menuLink = e.target.closest(".app-menu a.menu-item");
  if (menuLink) { closeMenu(); return; }
  const pill = e.target.closest(".day-pill");
  if (pill) { setDay(pill.dataset.day); return; }
  const starter = e.target.closest(".starter");
  if (starter) {
    const dayId = starter.dataset.day;
    const panel = document.getElementById("s-" + dayId);
    const secs = [...panel.querySelectorAll(".sec")];
    const target = secs.find(s => !isComplete(s)) || secs[0];
    focusSection(target);
    updateStarter(dayId);
    const y = target.getBoundingClientRect().top + window.scrollY - 82;
    window.scrollTo({ top: y, behavior: "smooth" });
    return;
  }
  const ck = e.target.closest(".ck");
  if (ck) { toggleCk(ck); return; }
  const note = e.target.closest(".ex-note");
  if (note) { note.classList.toggle("open"); return; }
  const all = e.target.closest(".sec-all");
  if (all) { toggleSectionAll(all.dataset.sec); return; }
  const reset = e.target.closest(".reset");
  if (reset) { resetDay(reset.dataset.day); return; }
  const head = e.target.closest(".sec-head");
  if (head) {
    const sec = head.closest(".sec");
    if (sec.classList.contains("collapsed")) focusSection(sec);
    else collapse(sec, true);
    updateStarter(panelDay(sec));
  }
});

// ---------- Theme toggle (defaults to system; remembers your choice) ----------
function effectiveTheme() {
  const attr = document.documentElement.getAttribute("data-theme");
  if (attr) return attr;
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}
function updateThemeIcon() {
  const label = document.getElementById("menu-theme-label");
  if (!label) return;
  label.textContent = effectiveTheme() === "dark" ? "Light Mode" : "Dark Mode";
}
function toggleTheme() {
  const next = effectiveTheme() === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  try { localStorage.setItem("theme", next); } catch (e) {}
  updateThemeIcon();
}

// ---------- Hamburger menu ----------
function openMenu() {
  document.getElementById("app-menu").classList.add("open");
  document.getElementById("menu-toggle").classList.add("open");
  document.getElementById("menu-toggle").setAttribute("aria-expanded", "true");
}
function closeMenu() {
  document.getElementById("app-menu").classList.remove("open");
  document.getElementById("menu-toggle").classList.remove("open");
  document.getElementById("menu-toggle").setAttribute("aria-expanded", "false");
}
function toggleMenu() {
  const open = document.getElementById("app-menu").classList.contains("open");
  if (open) closeMenu(); else openMenu();
}

buildUI();
setDay(activeId);
updateThemeIcon();
</script>
