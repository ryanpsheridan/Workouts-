<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  @font-face {
    font-family: "DM Sans";
    src: url("DMSans-VariableFont_opsz,wght.ttf") format("truetype");
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "DM Sans";
    src: url("DMSans-Italic-VariableFont_opsz,wght.ttf") format("truetype");
    font-weight: 100 900;
    font-style: italic;
    font-display: swap;
  }

  :root {
    --bg: #f3f5f8;
    --surface: #ffffff;
    --ink: #10151f;
    --ink-2: #55607a;
    --ink-3: #8a93a8;
    --line: #e6e9f0;
    --line-2: #eef1f6;
    --link: #2563eb;
    --radius: 16px;
    --font: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
    --shadow: 0 1px 2px rgba(16,21,31,0.04), 0 6px 20px rgba(16,21,31,0.05);
    --accent: #2563eb;
    --accent-soft: #eef4ff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg) !important;
    color: var(--ink) !important;
    color-scheme: light !important;
  }

  body {
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    max-width: 640px;
    margin: 0 auto;
    padding-bottom: 3rem;
    -webkit-text-size-adjust: 100%;
  }

  a { color: var(--link); }

  /* ---------- Header ---------- */
  .app-header {
    padding: calc(1.5rem + env(safe-area-inset-top)) 1.25rem 0.9rem;
  }
  .app-header h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
  .app-header p {
    font-size: 13px;
    color: var(--ink-2);
    margin-top: 4px;
    font-weight: 500;
  }

  /* ---------- Sticky day nav ---------- */
  .day-nav {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    gap: 8px;
    padding: 12px 1.25rem;
    overflow-x: auto;
    scrollbar-width: none;
    background: rgba(243,245,248,0.86);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .day-nav::-webkit-scrollbar { display: none; }

  .day-pill {
    flex: 1 0 auto;
    min-width: 72px;
    padding: 9px 12px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--surface);
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    line-height: 1.2;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .day-pill:active { transform: scale(0.96); }
  .pill-main { display: block; font-size: 13.5px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
  .pill-sub { display: block; font-size: 10.5px; font-weight: 600; color: var(--ink-3); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.04em; }
  .day-pill.active { border-color: transparent; box-shadow: var(--shadow); }
  .day-pill.active .pill-main { color: #fff; }
  .day-pill.active .pill-sub { color: rgba(255,255,255,0.82); }

  /* ---------- Day panel ---------- */
  .day-panel { display: none; padding: 0 1.25rem; }
  .day-panel.visible { display: block; }

  .day-hero {
    padding: 1.4rem 0 0.4rem;
  }
  .day-hero .kicker {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .day-hero .kicker::before {
    content: "";
    width: 22px; height: 3px; border-radius: 2px;
    background: var(--accent);
  }
  .day-hero h2 {
    font-size: 27px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-top: 8px;
  }
  .day-hero .focus {
    font-size: 14px;
    color: var(--ink-2);
    margin-top: 3px;
    font-weight: 500;
  }

  /* ---------- Warm-up accordion ---------- */
  .warmup {
    margin-top: 1.1rem;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .warmup-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 14px 15px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
  }
  .warmup-dot {
    width: 34px; height: 34px;
    flex: none;
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    display: grid; place-items: center;
    font-size: 16px;
  }
  .warmup-label { flex: 1; }
  .warmup-label .t {
    display: block;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .warmup-label .s {
    display: block;
    font-size: 11.5px;
    color: var(--ink-3);
    font-weight: 500;
    margin-top: 1px;
  }
  .chev {
    width: 9px; height: 9px;
    border-right: 2px solid var(--ink-3);
    border-bottom: 2px solid var(--ink-3);
    transform: rotate(45deg);
    transition: transform 0.2s ease;
    margin-right: 4px;
  }
  .warmup.open .chev { transform: rotate(-135deg); }
  .warmup-body { display: none; padding: 0 12px 12px; }
  .warmup.open .warmup-body { display: block; }

  /* ---------- Phases ---------- */
  .phase { margin-top: 1.6rem; }
  .phase-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.7rem;
  }
  .phase-num {
    width: 24px; height: 24px;
    flex: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    display: grid; place-items: center;
  }
  .phase-name {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .phase-name span { color: var(--ink-3); font-weight: 600; text-transform: none; letter-spacing: 0; margin-left: 6px; font-size: 12px; }

  /* ---------- Blocks & exercises ---------- */
  .stack { display: flex; flex-direction: column; gap: 10px; }

  .block {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .block.superset {
    border-left: 3px solid var(--accent);
  }
  .block-tag {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 9px 14px 0;
  }
  .block-items { display: flex; flex-direction: column; }
  .block.superset .ex + .ex { border-top: 1px solid var(--line-2); }

  .ex {
    display: grid;
    grid-template-columns: 34px 1fr auto;
    gap: 11px;
    align-items: start;
    padding: 13px 14px;
  }
  .ex-ord {
    font-family: var(--mono);
    font-size: 11.5px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 8px;
    padding: 5px 0;
    text-align: center;
    line-height: 1;
    margin-top: 1px;
  }
  .ex-name { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; color: var(--ink); word-break: break-word; }
  .ex-name a { text-decoration: underline; text-underline-offset: 2px; text-decoration-thickness: 1px; }
  .ex-note { font-size: 12.5px; color: var(--ink-2); margin-top: 4px; line-height: 1.45; }
  .ex-reps {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-2);
    background: var(--line-2);
    border-radius: 8px;
    padding: 5px 9px;
    text-align: right;
    white-space: nowrap;
    margin-top: 1px;
  }

  /* ---------- Footer ---------- */
  footer { padding: 2.2rem 1.25rem 0; text-align: center; }
  footer a { font-size: 12.5px; color: var(--ink-3); text-decoration: underline; text-underline-offset: 2px; }
</style>
</head>

        { ss: "",  ord: "3B", ex: '<a href="https://www.youtube.com/watch?v=HXrLaqNIkTs" target="_blank">Pallof Press (with hold)</a>', rp: "3 x 8 / side", note: "Press out, hold 3 sec, resist the pull. Anti-rotation core that keeps your swing on plane." },
        { ss: "4", ord: "4A", ex: "Suitcase Carry", rp: "Heavy / 30 yds / side", note: "Grip + oblique, one side at a time. Stand tall against the load." }
      ]},
      { name: "Finisher", rows: [
        { ss: "1", ord: "1A", ex: "Heavy Sled Push", rp: "6 x 20 yds", note: "Your heavier sled day - load it up and grind, forward only. A real leg killer, so keep the trips short." },
        { ss: "2", ord: "2A", ex: "Hanging Leg Raises", rp: "3 x 12", note: "Control the lower - no swing. Your abs rarely get sore, so make these strict and full-range." }
      ]}
    ]
  },
  {
    id: "upper-b", label: "Upper B", sub: "Fri", focus: "Press, carries & arms in motion",
    color: "#059669", soft: "#dff5ec",
    phases: [
      { name: "Power & Prime", rows: [
        { ss: "1", ord: "1A", ex: '<a href="https://www.youtube.com/watch?v=D3puZb7vzjQ" target="_blank">Med Ball Perpendicular Throw</a>', rp: "3 x 6 / side", note: "Stand sideways to the wall, load the trail hip, throw through the ball. Ground-up sequencing: feet, hips, torso, arms - pure swing power." },
        { ss: "",  ord: "1B", ex: "Explosive / Plyo Push-Ups", rp: "3 x 5", note: "Leave the floor, land soft. Upper-body power while you're fresh." }
      ]},
      { name: "Strength", rows: [
        { ss: "1", ord: "1A", ex: '<a href="https://www.youtube.com/watch?v=LN1zCeoIfbE" target="_blank">Half-Kneeling Landmine Press</a>', rp: "3 x 8 / side", note: "Replaces the old seated DB overhead press - far easier on the low back, and the half-kneel forces core + anti-lean. Golf-friendly overhead strength." },
        { ss: "",  ord: "1B", ex: "Chin-Ups", rp: "3 x AMRAP", note: "Underhand grip - your most bicep-dominant pull, placed early while you're strong since arms are the weak point. Band-assist to hit honest reps." },
        { ss: "2", ord: "2A", ex: "Incline DB Press", rp: "3 x 8-10", note: "Moderate load - front delts already take a beating all week, so quality over ego here." },
        { ss: "",  ord: "2B", ex: "Hanging TRX Row", rp: "3 x 10", note: "Straps are right there - pull the chest to the handles." },
        { ss: "3", ord: "3A", ex: "Incline DB Curls", rp: "3 x 8-10", note: "Your favorite curl - elbows back, full stretch at the bottom." },
        { ss: "",  ord: "3B", ex: "Farmer's Carry", rp: "Heavy / 40 yds", note: "Carry between curl sets - grip, forearms, traps, and heart rate at once, so the arm work never feels like standing-around isolation." }
      ]},
      { name: "Finisher", rows: [
        { ss: "1", ord: "1A", ex: "Assault Bike / Row / Ski Erg", rp: "5 x 30s hard / 30s easy", note: "Rotate the machine week to week." },
        { ss: "",  ord: "1B", ex: "Face Pulls", rp: "3 x 15", note: "Rear delts + posture, done between intervals to close out the week." }
      ]}
    ]
  }
];

let activeId = DAYS[0].id;

function groupRows(rows) {
  const groups = [];
  rows.forEach(r => {
    if (r.ss !== "" || groups.length === 0) groups.push([r]);
    else groups[groups.length - 1].push(r);
  });
  return groups;
}

function exHtml(r) {
  const note = r.note ? `<div class="ex-note">${r.note}</div>` : "";
  return `<div class="ex">
    <div class="ex-ord">${r.ord}</div>
    <div class="ex-body"><div class="ex-name">${r.ex}</div>${note}</div>
    <div class="ex-reps">${r.rp}</div>
  </div>`;
}

function blockHtml(group) {
  if (group.length === 1) return `<div class="block">${exHtml(group[0])}</div>`;
  const tag = group.length >= 4 ? "Giant set" : group.length === 3 ? "Tri-set" : "Superset";
  return `<div class="block superset">
    <div class="block-tag">${tag}</div>
    <div class="block-items">${group.map(exHtml).join("")}</div>
  </div>`;
}

function stackHtml(rows) {
  return `<div class="stack">${groupRows(rows).map(blockHtml).join("")}</div>`;
}

function buildUI() {
  document.getElementById("day-nav").innerHTML = DAYS.map(d =>
    `<button class="day-pill" role="tab" aria-selected="false" data-day="${d.id}">
      <span class="pill-main">${d.label}</span>
      <span class="pill-sub">${d.sub}</span>
    </button>`
  ).join("");

  document.getElementById("content").innerHTML = DAYS.map(d => {
    const phases = d.phases.map((p, i) =>
      `<section class="phase">
        <div class="phase-head">
          <span class="phase-num">${i + 1}</span>
          <span class="phase-name">${p.name}</span>
        </div>
        ${stackHtml(p.rows)}
      </section>`
    ).join("");

    const warmup = WARMUPS[d.id] || [];

    return `<div class="day-panel" role="tabpanel" id="s-${d.id}" style="--accent:${d.color};--accent-soft:${d.soft}">
      <div class="day-hero">
        <span class="kicker">${d.sub} &middot; Session</span>
        <h2>${d.label}</h2>
        <div class="focus">${d.focus}</div>
      </div>
      <div class="warmup" id="warmup-${d.id}">
        <button class="warmup-trigger" aria-expanded="false" aria-controls="warmup-body-${d.id}">
          <span class="warmup-dot">&#9650;</span>
          <span class="warmup-label">
            <span class="t">Pre-Flight Warm-Up</span>
            <span class="s">Pick what your body needs &middot; 2-3 sets</span>
          </span>
          <span class="chev"></span>
        </button>
        <div class="warmup-body" id="warmup-body-${d.id}">${stackHtml(warmup)}</div>
      </div>
      ${phases}
    </div>`;
  }).join("");
}

function setDay(id) {
  activeId = id;
  const day = DAYS.find(d => d.id === id);
  document.querySelectorAll(".day-pill").forEach(pill => {
    const on = pill.dataset.day === id;
    pill.classList.toggle("active", on);
    pill.setAttribute("aria-selected", on);
    pill.style.background = on ? day.color : "";
  });
  document.querySelectorAll(".day-panel").forEach(panel => {
    panel.classList.toggle("visible", panel.id === `s-${id}`);
  });
  window.scrollTo({ top: 0 });
}

document.addEventListener("click", e => {
  const pill = e.target.closest(".day-pill");
  if (pill) { setDay(pill.dataset.day); return; }
  const trigger = e.target.closest(".warmup-trigger");
  if (trigger) {
    const warmup = trigger.closest(".warmup");
    const open = warmup.classList.toggle("open");
    trigger.setAttribute("aria-expanded", open);
  }
});

buildUI();
setDay(activeId);
</script>
</body>
</html>
