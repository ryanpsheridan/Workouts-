<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Ryan's Weekly Program</title>

<style>
  @font-face {
    font-family: "DM Sans";
    src: url("DMSans-VariableFont_opsz,wght.ttf") format("truetype");
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "DM Sans";
    src: url("DMSans-Italic-VariableFont_opsz,wght.ttf") format("truetype");
    font-weight: 100 900;
    font-style: italic;
    font-display: swap;
  }

  :root {
    --bg-page: #f4f6f9;
    --bg-card: #ffffff;
    --bg-thead: #eef1f6;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --border: #dde2ea;
    --border-tab: #c8d0dc;
    --font-sans: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "SF Mono", monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-page) !important;
    color: var(--text-primary) !important;
    color-scheme: light !important;
  }

  body {
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    padding-bottom: 4rem;
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    padding: 1.75rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
    background: var(--bg-card) !important;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; color: var(--text-primary) !important; }
  header p { font-size: 13px; color: var(--text-secondary) !important; margin-top: 2px; }

  .tab-groups {
    padding: 0 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .group-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-muted) !important;
    margin-bottom: 6px;
  }

  .tab-row { display: flex; gap: 6px; }

  .day-tab {
    flex: 1;
    padding: 10px 6px;
    border-radius: 10px;
    border: 1px solid var(--border-tab);
    background: var(--bg-card);
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
  }

  .tab-main { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  .tab-sub { display: block; font-size: 10px; font-weight: 400; margin-top: 2px; color: var(--text-muted); }
  .day-tab.active .tab-main { color: #ffffff; }
  .day-tab.active .tab-sub { color: rgba(255, 255, 255, 0.8); }

  .session { display: none; padding: 0 1.25rem; }
  .session.visible { display: block; }

  .phase-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary) !important;
    margin: 1.5rem 0 0.6rem;
  }
  .phase-header:first-of-type { margin-top: 0; }

  .warmup-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .table-card {
    background: var(--bg-card) !important;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead tr { border-bottom: 1px solid var(--border); background: var(--bg-thead) !important; }
  th {
    padding: 8px 10px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted) !important;
  }
  td {
    padding: 11px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    background: var(--bg-card) !important;
    color: var(--text-primary) !important;
  }
  tr:last-child td { border-bottom: none; }

  .col-ss { width: 44px; color: var(--text-secondary) !important; font-size: 13px; font-weight: 500; }
  .col-ord { width: 48px; font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
  .col-ex { font-weight: 500; color: var(--text-primary) !important; word-break: break-word; }
  .col-ex .note { font-size: 12px; font-weight: 400; color: var(--text-secondary) !important; margin-top: 2px; }
  .col-rp { width: 110px; font-size: 12px; color: var(--text-secondary); text-align: right; }

  .flag {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    padding: 10px 12px;
    margin-top: 1.25rem;
    font-size: 13px;
    color: #dc2626;
    line-height: 1.5;
  }

  .accordion {
    background: var(--bg-card) !important;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .accordion-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--bg-card) !important;
    border: none;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .accordion-trigger-left { display: flex; align-items: center; gap: 8px; }
  .accordion-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .accordion-chevron {
    font-size: 11px;
    color: var(--text-muted);
    transition: transform 0.2s ease;
    display: inline-block;
  }
  .accordion.open .accordion-chevron { transform: rotate(180deg); }
  .accordion-body { display: none; border-top: 1px solid var(--border); }
  .accordion.open .accordion-body { display: block; }
</style>
</head>

<header>

</nav>

        { ss: "",  ord: "1B", ex: '<a href="https://www.youtube.com/watch?v=D3puZb7vzjQ" target="_blank" style="color:#16a34a;text-decoration:underline;">Medicine Ball Perpendicular Throw</a>', rp: "3 x 6 / side", note: "Stand sideways to wall. Load trail hip, separate hips from shoulders, throw through the ball. Feel ground-up sequencing: feet, hips, torso, arms." },
        { ss: "2", ord: "2A", ex: '<a href="https://www.youtube.com/watch?v=Zfr6wizR8rs" target="_blank" style="color:#16a34a;text-decoration:underline;">Single Leg Romanian Deadlift</a>', rp: "3 x 8 / side", note: "DB or KB in opposite hand. Hinge at hip, keep back flat. Builds the posterior chain and single-leg stability every golfer needs." },
        { ss: "",  ord: "2B", ex: '<a href="https://www.youtube.com/watch?v=_Y0w8b4ldgA" target="_blank" style="color:#16a34a;text-decoration:underline;">Lateral Lunge to Press</a>', rp: "3 x 8 / side", note: "Step wide, sit into hip, drive back up and press DB overhead. Trains lateral stability and hip loading - the engine of rotation." }
      ]},
      { name: "Phase 4 - Core & Anti-Rotation", rows: [
        { ss: "1", ord: "1A", ex: '<a href="https://www.youtube.com/watch?v=eT93C-xUZI8" target="_blank" style="color:#16a34a;text-decoration:underline;">Plank with Shoulder Tap</a>', rp: "3 x 10 / side", note: "Slow and controlled. Fight rotation as you lift each hand. Wider feet = easier. Build the stable core that lets rotation happen around it." },
        { ss: "",  ord: "1B", ex: '<a href="https://www.youtube.com/watch?v=nha5Hz5_SOs" target="_blank" style="color:#16a34a;text-decoration:underline;">Dead Bug with Band Resistance</a>', rp: "3 x 8 / side", note: "Attach band to rig overhead, hold tension. Extend opposite arm and leg. Back stays glued to floor - this is deep core." },
        { ss: "2", ord: "2A", ex: '<a href="https://www.youtube.com/watch?v=M-qIBLafIC8" target="_blank" style="color:#16a34a;text-decoration:underline;">Bird Dog with Hip Internal Rotation</a>', rp: "3 x 8 / side", note: "Extend leg back, then internally rotate so toes point toward midline. Hold 2 sec. Builds rotational control through the hip." },
        { ss: "",  ord: "2B", ex: '<a href="https://www.youtube.com/watch?v=w2CAHDUeR3M" target="_blank" style="color:#16a34a;text-decoration:underline;">Turkish Get-Up (Half)</a>', rp: "2 x 3 / side", note: "KB or DB. Go to tall sit position and return. Builds shoulder stability, core control, and the body awareness every golfer needs. Keep load light to start." }
      ]}
    ]
  }
];

function buildTable(rows, color) {
  const rowsHtml = rows.map(r => {
    const warn = r.warn ? ' <span style="color:#dc2626;font-size:13px;">&#9888;</span>' : '';
    const fire = r.fire ? ' <span style="font-size:13px;">&#128293;</span>' : '';
    const note = r.note ? `<div class="note">${r.note}</div>` : '';
    return `<tr>
      <td class="col-ss">${r.ss}</td>
      <td class="col-ord" style="color:${color}">${r.ord}</td>
      <td class="col-ex">${r.ex}${warn}${fire}${note}</td>
      <td class="col-rp">${r.rp}</td>
    </tr>`;
  }).join('');

  return `<div class="table-card"><table>
    <thead><tr><th class="col-ss">SS</th><th class="col-ord">Ord</th><th>Exercise</th><th class="col-rp">Reps</th></tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table></div>`;
}

let activeId = "lower-a";

function buildUI() {
  for (const group of ["lower", "upper", "golf"]) {
    const container = document.getElementById(`${group}-tabs`);
    if (!container) continue;
    container.innerHTML = DAYS
      .filter(d => d.group === group)
      .map(d => `<button class="day-tab" role="tab" aria-selected="false" data-day="${d.id}" data-color="${d.color}">
        <span class="tab-main">${d.label}</span>
        <span class="tab-sub">${d.sub}</span>
      </button>`)
      .join('');
  }

  document.getElementById("content").innerHTML = DAYS.map(d => {
    const isTPI = d.id === "tpi-light" || d.id === "tpi-full";
    const phases = isTPI
      ? d.phases.map((p, i) =>
        `<div class="accordion" id="phase-${d.id}-${i}" style="margin-top:${i === 0 ? '0' : '10px'}">
          <button class="accordion-trigger" aria-expanded="false" aria-controls="phase-body-${d.id}-${i}">
            <div class="accordion-trigger-left">
              <span class="accordion-title">${p.name}</span>
            </div>
            <span class="accordion-chevron">&#9660;</span>
          </button>
          <div class="accordion-body" id="phase-body-${d.id}-${i}">${buildTable(p.rows, d.color)}</div>
        </div>`
      ).join('')
      : d.phases.map(p =>
        `<div class="phase-header">${p.name}</div>${buildTable(p.rows, d.color)}`
      ).join('');
    const flag = d.flag
      ? `<div class="flag"><span>&#9888;</span><span>${d.flag}</span></div>`
      : '';
    return `<div class="session" role="tabpanel" id="s-${d.id}">
      <div class="accordion" id="warmup-${d.id}">
        <button class="accordion-trigger" aria-expanded="false" aria-controls="warmup-body-${d.id}">
          <div class="accordion-trigger-left">
            <span class="accordion-title">Pre-Flight Warm-Up</span>
            <span class="warmup-badge" style="background:${d.light};color:${d.color}">2-3 sets</span>
          </div>
          <span class="accordion-chevron">&#9660;</span>
        </button>
        <div class="accordion-body" id="warmup-body-${d.id}">${buildTable(WARMUP, d.color)}</div>
      </div>
      ${phases}
      ${flag}
    </div>`;
  }).join('');
}

function setDay(id) {
  activeId = id;
  const day = DAYS.find(d => d.id === id);

  document.querySelectorAll(".day-tab").forEach(tab => {
    const isActive = tab.dataset.day === id;
    tab.classList.toggle("active", isActive);
    tab.setAttribute("aria-selected", isActive);
    tab.style.background = isActive ? day.color : "";
    tab.style.borderColor = isActive ? day.color : "";
  });

  document.querySelectorAll(".session").forEach(panel => {
    panel.classList.toggle("visible", panel.id === `s-${id}`);
  });
}

document.addEventListener("click", e => {
  const tab = e.target.closest(".day-tab");
  if (tab) {
    setDay(tab.dataset.day);
    return;
  }

  const trigger = e.target.closest(".accordion-trigger");
  if (trigger) {
    const accordion = trigger.closest(".accordion");
    const isOpen = accordion.classList.toggle("open");
    trigger.setAttribute("aria-expanded", isOpen);
  }
});

buildUI();
setDay(activeId);
</script>
</body>
</html>
