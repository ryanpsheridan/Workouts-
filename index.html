<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="apple-mobile-web-app-title" content="Workouts">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  @font-face {
    font-family: "DM Sans";
    src: url("DMSans-VariableFont_opsz,wght.ttf") format("truetype");
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "DM Sans";
    src: url("DMSans-Italic-VariableFont_opsz,wght.ttf") format("truetype");
    font-weight: 100 900;
    font-style: italic;
    font-display: swap;
  }

  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --ink: #12161d;
    --ink-2: #5a6478;
    --ink-3: #949cad;
    --line: #e7e9ef;
    --line-2: #eff1f5;
    --field: #f1f3f6;
    --rail: #c3c9d4;      /* neutral left border on cards */
    --link: #2563eb;      /* blue = tappable link */
    --done: #16a34a;      /* green = completed / progress */
    --accent: #2563eb;    /* per-day section color, set on each panel */
    --accent-soft: #eef4ff;
    --font: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg) !important;
    color: var(--ink) !important;
    color-scheme: light !important;
  }

  body {
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    max-width: 640px;
    margin: 0 auto;
    padding-bottom: 3rem;
    -webkit-text-size-adjust: 100%;
  }

  a { color: var(--link); }

  /* ---------- Header ---------- */
  .app-header { padding: calc(1.6rem + env(safe-area-inset-top)) 1.25rem 0.9rem; }
  .app-header h1 { font-size: 25px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
  .app-header p { font-size: 13px; color: var(--ink-2); margin-top: 4px; font-weight: 500; }

  /* ---------- Sticky day nav ---------- */
  .day-nav {
    position: sticky; top: 0; z-index: 20;
    display: flex; gap: 7px;
    padding: 11px 1.25rem;
    overflow-x: auto; scrollbar-width: none;
    background: rgba(246,247,249,0.88);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    backdrop-filter: saturate(180%) blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-pill {
    flex: 1 0 auto; min-width: 70px;
    padding: 8px 12px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--surface);
    font-family: inherit; cursor: pointer; text-align: center; line-height: 1.2;
    transition: transform 0.12s ease; -webkit-tap-highlight-color: transparent;
  }
  .day-pill:active { transform: scale(0.96); }
  .pill-main { display: block; font-size: 13.5px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
  .pill-sub { display: block; font-size: 10px; font-weight: 600; color: var(--ink-3); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.05em; }
  .day-pill.active { border-color: transparent; }
  .day-pill.active .pill-main { color: #fff; }
  .day-pill.active .pill-sub { color: rgba(255,255,255,0.78); }

  /* ---------- Day panel ---------- */
  .day-panel { display: none; padding: 0 1.25rem; }
  .day-panel.visible { display: block; }

  .day-hero { padding: 1.5rem 0 0.3rem; }
  .day-hero .kicker {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--accent);
  }
  .day-hero .kicker::before { content: ""; width: 20px; height: 2px; background: var(--accent); border-radius: 2px; }
  .day-hero h2 { font-size: 27px; font-weight: 800; letter-spacing: -0.03em; margin-top: 9px; }
  .day-hero .focus { font-size: 14px; color: var(--ink-2); margin-top: 3px; font-weight: 500; }

  .progress { display: flex; align-items: center; gap: 10px; margin-top: 13px; font-size: 12.5px; color: var(--ink-3); font-weight: 600; }
  .progress .bar { flex: 1; height: 4px; border-radius: 3px; background: var(--line); overflow: hidden; max-width: 150px; }
  .progress .bar > i { display: block; height: 100%; width: 0; background: var(--done); transition: width 0.25s ease; }
  .progress .reset { border: none; background: none; font-family: inherit; font-size: 12.5px; color: var(--link); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; padding: 0; }

  /* ---------- Section (warm-up + phases share this) ---------- */
  .sec { margin-top: 1.5rem; }
  .sec-head {
    width: 100%; display: flex; align-items: center; gap: 11px;
    padding: 2px 2px 11px; background: none; border: none; cursor: pointer;
    font-family: inherit; text-align: left; -webkit-tap-highlight-color: transparent;
  }
  .sec-num { flex: none; font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0; min-width: 20px; }
  .sec-title { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .sec-name { font-size: 13px; font-weight: 800; letter-spacing: 0.03em; text-transform: uppercase; color: var(--ink); }
  .sec-sub { font-size: 11.5px; font-weight: 500; color: var(--ink-3); margin-top: 1px; }
  .sec-status { font-size: 11.5px; font-weight: 700; color: var(--ink-3); display: flex; align-items: center; }
  .sec-check { width: 18px; height: 18px; border-radius: 50%; background: var(--done); position: relative; display: inline-block; }
  .sec-check::after { content: ""; position: absolute; left: 6px; top: 3px; width: 4px; height: 8px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .chev { width: 9px; height: 9px; border-right: 2px solid var(--ink-3); border-bottom: 2px solid var(--ink-3); transform: rotate(-135deg); transition: transform 0.2s ease; margin: 0 2px; }
  .sec.collapsed .chev { transform: rotate(45deg); }
  .sec.collapsed .sec-body { display: none; }
  .sec.collapsed .sec-head { padding-bottom: 2px; }

  /* ---------- Blocks & exercises ---------- */
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .block {
    background: var(--surface);
    border: 1px solid var(--line); border-left: 3px solid var(--rail);
    border-radius: 0 14px 14px 0;   /* square left, rounded right */
    overflow: hidden;
  }
  .block-tag { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); padding: 10px 14px 0 15px; }
  .block-items { display: flex; flex-direction: column; }
  .block .ex + .ex { border-top: 1px solid var(--line-2); }

  .ex { display: grid; grid-template-columns: 22px 24px 1fr auto; gap: 10px; align-items: start; padding: 13px 14px 13px 15px; }

  .ck {
    width: 22px; height: 22px; margin-top: 1px; flex: none; padding: 0;
    border-radius: 50%; border: 1.5px solid #cbd1dc; background: #fff;
    cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent;
    transition: background 0.12s ease, border-color 0.12s ease;
  }
  .ck:active { transform: scale(0.9); }
  .ck.done { background: var(--done); border-color: var(--done); }
  .ck.done::after { content: ""; position: absolute; left: 7px; top: 3.5px; width: 5px; height: 9px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg); }

  .ex-ord { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--ink-3); margin-top: 3px; letter-spacing: -0.02em; }
  .ex-name { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; color: var(--ink); word-break: break-word; }
  .ex-note { font-size: 12.5px; color: var(--ink-2); margin-top: 4px; line-height: 1.45; }
  .ex-reps { font-size: 12px; font-weight: 600; color: var(--ink-2); background: var(--field); border-radius: 8px; padding: 5px 9px; text-align: right; white-space: nowrap; margin-top: 1px; }

  /* how-to link, moved off the title into a consistent chip at the card foot */
  .ex-demo {
    display: inline-flex; align-items: center; gap: 7px; margin-top: 10px;
    padding: 5px 11px 5px 10px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--surface); font-size: 11px; font-weight: 700; letter-spacing: 0.02em;
    color: var(--link); text-decoration: none; -webkit-tap-highlight-color: transparent;
  }
  .ex-demo::before { content: ""; width: 0; height: 0; border-style: solid; border-width: 5px 0 5px 8px; border-color: transparent transparent transparent var(--link); }
  .ex-demo:active { background: var(--field); }

  /* completed exercise: mute the content, keep the green check bright */
  .ex.done .ex-ord, .ex.done .ex-body, .ex.done .ex-reps { opacity: 0.42; transition: opacity 0.15s ease; }

  /* ---------- Footer ---------- */
  footer { padding: 2.4rem 1.25rem 0; text-align: center; }
  footer a { font-size: 12.5px; color: var(--ink-3); text-decoration: underline; text-underline-offset: 2px; }
</style>
</head>

</header>

<main id="content"></main>

        { ss: "",  ord: "2B", ex: "Calf Raises OR Lateral Band Walks", rp: "15 reps / 15 steps" },
        { ss: "3", ord: "3A", ex: "Single-Leg DB RDL", link: "https://www.youtube.com/watch?v=Zfr6wizR8rs", rp: "3 x 8 / side", note: "Hamstring, glute, and balance. DB in the hand opposite the working leg." },
        { ss: "",  ord: "3B", ex: "Pallof Press (with hold)", link: "https://www.youtube.com/watch?v=HXrLaqNIkTs", rp: "3 x 8 / side", note: "Press out, hold 3 sec, resist the pull. Anti-rotation core that keeps your swing on plane." },
        { ss: "4", ord: "4A", ex: "Suitcase Carry", rp: "Heavy / 30 yds / side", note: "Grip + oblique, one side at a time. Stand tall against the load." }
      ]},
      { name: "Finisher", rows: [
        { ss: "1", ord: "1A", ex: "Heavy Sled Push", rp: "6 x 20 yds", note: "Your heavier sled day - load it up and grind, forward only. A real leg killer, so keep the trips short." },
        { ss: "2", ord: "2A", ex: "Hanging Leg Raises", rp: "3 x 12", note: "Control the lower - no swing. Your abs rarely get sore, so make these strict and full-range." }
      ]}
    ]
  },
  {
    id: "upper-b", label: "Upper B", sub: "Fri", focus: "Press, carries & arms in motion",
    color: "#059669", soft: "#dff5ec",
    phases: [
      { name: "Power & Prime", rows: [
        { ss: "1", ord: "1A", ex: "Med Ball Perpendicular Throw", link: "https://www.youtube.com/watch?v=D3puZb7vzjQ", rp: "3 x 6 / side", note: "Stand sideways to the wall, load the trail hip, throw through the ball. Ground-up sequencing: feet, hips, torso, arms - pure swing power." },
        { ss: "",  ord: "1B", ex: "Explosive / Plyo Push-Ups", rp: "3 x 5", note: "Leave the floor, land soft. Upper-body power while you're fresh." }
      ]},
      { name: "Strength", rows: [
        { ss: "1", ord: "1A", ex: "Half-Kneeling Landmine Press", link: "https://www.youtube.com/watch?v=LN1zCeoIfbE", rp: "3 x 8 / side", note: "Replaces the old seated DB overhead press - far easier on the low back, and the half-kneel forces core + anti-lean. Golf-friendly overhead strength." },
        { ss: "",  ord: "1B", ex: "Chin-Ups", rp: "3 x AMRAP", note: "Underhand grip - your most bicep-dominant pull, placed early while you're strong since arms are the weak point. Band-assist to hit honest reps." },
        { ss: "2", ord: "2A", ex: "Incline DB Press", rp: "3 x 8-10", note: "Moderate load - front delts already take a beating all week, so quality over ego here." },
        { ss: "",  ord: "2B", ex: "Hanging TRX Row", rp: "3 x 10", note: "Straps are right there - pull the chest to the handles." },
        { ss: "3", ord: "3A", ex: "Incline DB Curls", rp: "3 x 8-10", note: "Your favorite curl - elbows back, full stretch at the bottom." },
        { ss: "",  ord: "3B", ex: "Farmer's Carry", rp: "Heavy / 40 yds", note: "Carry between curl sets - grip, forearms, traps, and heart rate at once, so the arm work never feels like standing-around isolation." }
      ]},
      { name: "Finisher", rows: [
        { ss: "1", ord: "1A", ex: "Assault Bike / Row / Ski Erg", rp: "5 x 30s hard / 30s easy", note: "Rotate the machine week to week." },
        { ss: "",  ord: "1B", ex: "Face Pulls", rp: "3 x 15", note: "Rear delts + posture, done between intervals to close out the week." }
      ]}
    ]
  }
];

let activeId = DAYS[0].id;
let STATE = {};
try { STATE = JSON.parse(localStorage.getItem("wp-v1")) || {}; } catch (e) { STATE = {}; }
function save() { try { localStorage.setItem("wp-v1", JSON.stringify(STATE)); } catch (e) {} }
function dayFromKey(key) { return key.split("#")[0]; }

function groupRows(rows) {
  const groups = [];
  rows.forEach(r => {
    if (r.ss !== "" || groups.length === 0) groups.push([r]);
    else groups[groups.length - 1].push(r);
  });
  return groups;
}

function exHtml(r, key) {
  const note = r.note ? `<div class="ex-note">${r.note}</div>` : "";
  const demo = r.link ? `<a class="ex-demo" href="${r.link}" target="_blank" rel="noopener">Watch demo</a>` : "";
  const on = STATE[key] ? " done" : "";
  return `<div class="ex${on}">
    <button class="ck${on}" data-key="${key}" aria-label="Mark complete" aria-pressed="${!!STATE[key]}"></button>
    <div class="ex-ord">${r.ord}</div>
    <div class="ex-body"><div class="ex-name">${r.ex}</div>${note}${demo}</div>
    <div class="ex-reps">${r.rp}</div>
  </div>`;
}

function blockHtml(group, prefix) {
  const items = group.map(r => exHtml(r, `${prefix}#${r.ord}`)).join("");
  if (group.length === 1) return `<div class="block">${items}</div>`;
  const tag = group.length >= 4 ? "Giant set" : group.length === 3 ? "Tri-set" : "Superset";
  return `<div class="block"><div class="block-tag">${tag}</div><div class="block-items">${items}</div></div>`;
}

function stackHtml(rows, prefix) {
  return `<div class="stack">${groupRows(rows).map(g => blockHtml(g, prefix)).join("")}</div>`;
}

function sectionHtml(secId, num, title, sub, rows, prefix) {
  const subHtml = sub ? `<span class="sec-sub">${sub}</span>` : "";
  return `<section class="sec" id="sec-${secId}">
    <button class="sec-head" aria-expanded="true" aria-controls="body-${secId}">
      <span class="sec-num">${num}</span>
      <span class="sec-title"><span class="sec-name">${title}</span>${subHtml}</span>
      <span class="sec-status" data-status="${secId}"></span>
      <span class="chev"></span>
    </button>
    <div class="sec-body" id="body-${secId}">${stackHtml(rows, prefix)}</div>
  </section>`;
}

function buildUI() {
  document.getElementById("day-nav").innerHTML = DAYS.map(d =>
    `<button class="day-pill" role="tab" aria-selected="false" data-day="${d.id}">
      <span class="pill-main">${d.label}</span>
      <span class="pill-sub">${d.sub}</span>
    </button>`
  ).join("");

  document.getElementById("content").innerHTML = DAYS.map(d => {
    const warmup = WARMUPS[d.id] || [];
    const warmSec = sectionHtml(`${d.id}-wu`, "00", "Pre-Flight Warm-Up", "Pick what your body needs &middot; 2-3 sets", warmup, `${d.id}#wu`);
    const phaseSecs = d.phases.map((p, i) =>
      sectionHtml(`${d.id}-p${i}`, "0" + (i + 1), p.name, "", p.rows, `${d.id}#${i}`)
    ).join("");

    return `<div class="day-panel" role="tabpanel" id="s-${d.id}" style="--accent:${d.color};--accent-soft:${d.soft}">
      <div class="day-hero">
        <span class="kicker">${d.sub} &middot; Session</span>
        <h2>${d.label}</h2>
        <div class="focus">${d.focus}</div>
        <div class="progress">
          <span id="pg-${d.id}">0 / 0 done</span>
          <span class="bar"><i id="bar-${d.id}"></i></span>
          <button class="reset" data-day="${d.id}" style="display:none">Reset</button>
        </div>
      </div>
      ${warmSec}
      ${phaseSecs}
    </div>`;
  }).join("");

  // Initial state: collapse any section already fully checked; set statuses.
  document.querySelectorAll(".sec").forEach(sec => {
    if (refreshSection(sec.id.replace("sec-", ""))) collapse(sec, true);
  });
  DAYS.forEach(d => updateProgress(d.id));
}

function sectionEl(secId) { return document.getElementById("sec-" + secId); }

function refreshSection(secId) {
  const sec = sectionEl(secId);
  if (!sec) return false;
  const total = sec.querySelectorAll(".ck").length;
  const done = sec.querySelectorAll(".ck.done").length;
  const st = sec.querySelector("[data-status]");
  const complete = total > 0 && done === total;
  if (st) {
    if (complete) st.innerHTML = '<span class="sec-check"></span>';
    else if (done > 0) st.textContent = `${done} / ${total}`;
    else st.textContent = "";
  }
  return complete;
}

function collapse(sec, on) {
  sec.classList.toggle("collapsed", on);
  const head = sec.querySelector(".sec-head");
  if (head) head.setAttribute("aria-expanded", String(!on));
}

function updateProgress(dayId) {
  const panel = document.getElementById("s-" + dayId);
  if (!panel) return;
  // Day progress counts working sets only (warm-up is pick-and-choose).
  const cks = [...panel.querySelectorAll(".ck")].filter(c => c.dataset.key.indexOf("#wu#") < 0);
  const done = cks.filter(c => c.classList.contains("done")).length;
  const pg = document.getElementById("pg-" + dayId);
  const bar = document.getElementById("bar-" + dayId);
  const reset = panel.querySelector(".reset");
  if (pg) pg.textContent = `${done} / ${cks.length} done`;
  if (bar) bar.style.width = cks.length ? `${(done / cks.length) * 100}%` : "0";
  if (reset) reset.style.display = panel.querySelectorAll(".ck.done").length > 0 ? "" : "none";
}

function toggleCk(ck) {
  const key = ck.dataset.key;
  const done = ck.classList.toggle("done");
  ck.setAttribute("aria-pressed", String(done));
  const ex = ck.closest(".ex");
  if (ex) ex.classList.toggle("done", done);
  if (done) STATE[key] = 1; else delete STATE[key];
  save();
  const sec = ck.closest(".sec");
  const secId = sec.id.replace("sec-", "");
  const complete = refreshSection(secId);
  updateProgress(dayFromKey(key));
  // Auto-collapse a section once every item in it is checked (slight delay so
  // the green check registers first). Un-checking never force-expands.
  if (complete) setTimeout(() => { if (refreshSection(secId)) collapse(sec, true); }, 380);
}

function resetDay(dayId) {
  const panel = document.getElementById("s-" + dayId);
  if (!panel) return;
  panel.querySelectorAll(".ck.done").forEach(ck => {
    ck.classList.remove("done");
    ck.setAttribute("aria-pressed", "false");
    const ex = ck.closest(".ex");
    if (ex) ex.classList.remove("done");
    delete STATE[ck.dataset.key];
  });
  save();
  panel.querySelectorAll(".sec").forEach(sec => {
    collapse(sec, false);
    refreshSection(sec.id.replace("sec-", ""));
  });
  updateProgress(dayId);
}

function setDay(id) {
  activeId = id;
  const day = DAYS.find(d => d.id === id);
  document.querySelectorAll(".day-pill").forEach(pill => {
    const on = pill.dataset.day === id;
    pill.classList.toggle("active", on);
    pill.setAttribute("aria-selected", on);
    pill.style.background = on ? day.color : "";
  });
  document.querySelectorAll(".day-panel").forEach(panel => {
    panel.classList.toggle("visible", panel.id === `s-${id}`);
  });
  window.scrollTo({ top: 0 });
}

document.addEventListener("click", e => {
  const pill = e.target.closest(".day-pill");
  if (pill) { setDay(pill.dataset.day); return; }
  const ck = e.target.closest(".ck");
  if (ck) { toggleCk(ck); return; }
  const reset = e.target.closest(".reset");
  if (reset) { resetDay(reset.dataset.day); return; }
  const head = e.target.closest(".sec-head");
  if (head) {
    const sec = head.closest(".sec");
    collapse(sec, !sec.classList.contains("collapsed"));
  }
});

buildUI();
setDay(activeId);
</script>
</body>
